name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  zon-check:
    name: zon-check
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Clone sibling repos (app build.zig.zon path dependencies)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          sibling="$(dirname "${GITHUB_WORKSPACE}")"
          echo "GITHUB_WORKSPACE=${GITHUB_WORKSPACE}"
          echo "sibling=${sibling}"
          auth_clone() {
            local repo="$1"
            local dest="$2"
            shift 2
            if [ ! -d "${dest}" ]; then
              git clone --depth 1 "$@" "https://x-access-token:${GH_TOKEN}@github.com/${repo}.git" "${dest}"
            fi
          }
          auth_clone embed-zig/embed-zig "${sibling}/embed-zig" --branch v1.0.0
          auth_clone embed-zig/embed-zig-pkgs "${sibling}/embed-zig-pkgs"

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Show tool versions
        run: |
          zig version
          make --version

      - name: Run zon generation
        run: make

      - name: Verify generated zon files are committed
        run: |
          status="$(git status --short --untracked-files=no)"
          if [ -n "$status" ]; then
            echo "Tracked files changed after 'make':"
            printf '%s\n' "$status"
            echo
            git diff --stat
            exit 1
          fi

  test:
    name: test (${{ matrix.os }})
    needs: zon-check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Clone sibling repos (app build.zig.zon path dependencies)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          sibling="$(dirname "${GITHUB_WORKSPACE}")"
          echo "GITHUB_WORKSPACE=${GITHUB_WORKSPACE}"
          echo "sibling=${sibling}"
          auth_clone() {
            local repo="$1"
            local dest="$2"
            shift 2
            if [ ! -d "${dest}" ]; then
              git clone --depth 1 "$@" "https://x-access-token:${GH_TOKEN}@github.com/${repo}.git" "${dest}"
            fi
          }
          auth_clone embed-zig/embed-zig "${sibling}/embed-zig" --branch v1.0.0
          auth_clone embed-zig/embed-zig-pkgs "${sibling}/embed-zig-pkgs"

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install make on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install make -y

      - name: Show tool versions
        run: |
          zig version
          make --version

      - name: Generate manifests for tests
        run: make

      - name: Run package tests
        run: zig build test
